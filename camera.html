 
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Ambil Foto Counter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #1a1a1a;
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }
    video {
      width: 100%;
      border-radius: 16px;
      background: #111;
      aspect-ratio: 1/1;
      object-fit: cover;
    }
    .preview {
      display: none;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-top: 12px;
    }
    .preview img {
      width: 100%;
      display: block;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      flex: 1 1 auto;
      padding: 14px 10px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 70px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    .controls button:active {
      transform: scale(0.95);
    }
    .btn-capture {
      background: #fff;
      color: #1e3c72;
    }
    .btn-switch {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .btn-close {
      background: #e74c3c;
      color: #fff;
    }
    .btn-upload {
      background: #25D366;
      color: #fff;
      display: none;
    }
    .btn-retake {
      background: #ffc107;
      color: #1a1a1a;
      display: none;
    }
    .status {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      min-height: 24px;
      padding: 4px;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .info-badge {
      background: rgba(255, 255, 255, 0.06);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 10px;
    }
    .error-message {
      color: #ff6b6b;
    }
    .success-message {
      color: #51cf66;
    }
    .warning-message {
      color: #ffd93d;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header info -->
  <div class="info-badge" id="infoBadge">📸 Ambil Foto Counter</div>

  <!-- Video & Canvas & Preview -->
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div class="preview" id="preview">
    <img id="capturedImage" src="" alt="foto" />
  </div>

  <!-- Tombol kontrol -->
  <div class="controls">
    <button class="btn-switch" id="switchBtn" onclick="switchCamera()">🔄 Ganti</button>
    <button class="btn-capture" id="captureBtn" onclick="capture()">📷 Ambil</button>
    <button class="btn-retake" id="retakeBtn" onclick="retake()">↩️ Ulangi</button>
    <button class="btn-upload" id="uploadBtn" onclick="uploadPhoto()">⬆ Unggah</button>
    <button class="btn-close" onclick="closeWindow()">✕ Tutup</button>
  </div>

  <!-- Status -->
  <div class="status" id="status">🔍 Menyiapkan kamera...</div>
</div>

<script>
  // ================================================================
  // 1. KONFIGURASI
  // ================================================================
  // GANTI URL INI dengan URL Web App GAS Anda (doPost)
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyuvVFPCAcUS8G6Jmz-vfbM_hppSaZt4uckPQGdHkg/dev'; // <-- GANTI!

  // ================================================================
  // 2. ELEMEN DOM
  // ================================================================
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const preview = document.getElementById('preview');
  const capturedImg = document.getElementById('capturedImage');
  const statusEl = document.getElementById('status');
  const infoBadge = document.getElementById('infoBadge');

  const captureBtn = document.getElementById('captureBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const switchBtn = document.getElementById('switchBtn');

  // ================================================================
  // 3. STATE
  // ================================================================
  let stream = null;
  let facingMode = 'environment'; // 'environment' | 'user'
  let capturedDataURL = null;
  let counterId = null;

  // ================================================================
  // 4. AMBIL ID COUNTER DARI URL
  // ================================================================
  function getCounterIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      const parsed = parseInt(id, 10);
      if (!isNaN(parsed) && parsed > 0) return parsed;
    }
    return null;
  }

  counterId = getCounterIdFromURL();
  console.log('🔍 counterId:', counterId);

  if (counterId) {
    infoBadge.textContent = `📸 Counter ID: ${counterId}`;
    statusEl.textContent = '📷 Menunggu kamera...';
  } else {
    infoBadge.textContent = '⚠️ ID counter tidak ditemukan di URL';
    statusEl.textContent = '⚠️ URL harus menyertakan ?id=angka';
    statusEl.className = 'status error-message';
    // Tampilkan alert tapi tetap coba kamera
    setTimeout(() => {
      alert('⚠️ ID counter tidak ditemukan di URL.\nPastikan URL menyertakan ?id=angka');
    }, 400);
  }

  // ================================================================
  // 5. FUNGSI KAMERA
  // ================================================================
  function startCamera(mode) {
    statusEl.textContent = '🔍 Mengakses kamera...';
    statusEl.className = 'status warning-message';

    const constraints = {
      video: {
        facingMode: mode,
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    // Hentikan stream sebelumnya
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }

    navigator.mediaDevices.getUserMedia(constraints)
      .then(s => {
        stream = s;
        video.srcObject = s;
        video.onloadedmetadata = () => {
          video.play();
          statusEl.textContent = '✅ Kamera siap.';
          statusEl.className = 'status success-message';
        };
        facingMode = mode;
      })
      .catch(err => {
        console.error('❌ Error akses kamera:', err);
        statusEl.textContent = '❌ Gagal akses kamera: ' + err.message;
        statusEl.className = 'status error-message';
        alert('Tidak dapat mengakses kamera.\nPastikan Anda memberikan izin dan menggunakan HTTPS.\n\nError: ' + err.message);
      });
  }

  function switchCamera() {
    const newMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera(newMode);
    resetUI();
  }

  function capture() {
    if (!stream) {
      alert('Kamera belum siap. Tunggu sebentar.');
      return;
    }
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 480;
    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);
    capturedDataURL = canvas.toDataURL('image/jpeg', 0.92);

    // Tampilkan preview
    capturedImg.src = capturedDataURL;
    preview.style.display = 'block';
    video.style.display = 'none';

    captureBtn.style.display = 'none';
    retakeBtn.style.display = 'inline-block';
    uploadBtn.style.display = 'inline-block';

    statusEl.textContent = '📸 Foto diambil. Klik "Unggah" untuk simpan.';
    statusEl.className = 'status warning-message';
  }

  function retake() {
    resetUI();
  }

  function resetUI() {
    preview.style.display = 'none';
    video.style.display = 'block';
    captureBtn.style.display = 'inline-block';
    retakeBtn.style.display = 'none';
    uploadBtn.style.display = 'none';
    capturedDataURL = null;
    statusEl.textContent = '✅ Kamera siap.';
    statusEl.className = 'status success-message';
  }

  function closeWindow() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    // Tutup popup
    window.close();
    // Fallback jika gagal
    setTimeout(() => {
      window.location.href = 'about:blank';
    }, 500);
  }

  // ================================================================
  // 6. UNGGAH FOTO KE GAS
  // ================================================================
  function uploadPhoto() {
    if (!capturedDataURL) {
      alert('📸 Ambil foto dulu!');
      return;
    }
    if (!counterId) {
      alert('❌ ID counter tidak ditemukan. Tidak dapat mengunggah.');
      return;
    }

    statusEl.textContent = '📤 Mengunggah...';
    statusEl.className = 'status warning-message';
    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="loader"></span> Mengunggah';

    const payload = {
      action: 'uploadPhoto',
      counterId: counterId,
      photo: capturedDataURL,
      filename: 'counter_' + counterId + '.jpg'
    };

    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors', // karena GAS tidak mendukung CORS
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(() => {
        // mode no-cors → response tidak bisa dibaca, tapi request tetap terkirim
        statusEl.textContent = '✅ Foto berhasil diunggah! Tutup halaman ini.';
        statusEl.className = 'status success-message';
        uploadBtn.innerHTML = '✅ Berhasil';
        uploadBtn.style.background = '#27ae60';
        alert('✅ Foto berhasil diunggah!\nSilakan tutup halaman ini dan refresh aplikasi utama.');
        setTimeout(() => window.close(), 3000);
      })
      .catch(err => {
        console.error('❌ Error upload:', err);
        statusEl.textContent = '❌ Gagal mengunggah: ' + err.message;
        statusEl.className = 'status error-message';
        alert('❌ Gagal mengunggah. Coba lagi.\n\nError: ' + err.message);
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = '⬆ Unggah';
        uploadBtn.style.background = '#25D366';
      });
  }

  // ================================================================
  // 7. MULAI
  // ================================================================
  // Mulai kamera (mode belakang)
  startCamera('environment');

  // Jika tombol "Ganti" tidak responsif, tambahkan listener alternatif
  switchBtn.addEventListener('click', switchCamera);

  // Fallback jika window.close() tidak berfungsi di beberapa browser
  window.addEventListener('unload', () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
  });

  console.log('✅ camera.html siap.');
</script>
</body>
</html>
